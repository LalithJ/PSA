<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Search Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'linkedin-blue': '#0a66c2',
                        'linkedin-darkBlue': '#004182',
                        'linkedin-gray': '#f3f2ef',
                    },
                    boxShadow: {
                        'linkedin': '0 0 0 1px rgba(0,0,0,0.08), 0 4px 4px rgba(0,0,0,0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        .bg-linkedin-gray { background-color: #f3f2ef; }
    </style>
</head>
<body class="min-h-screen bg-linkedin-gray font-sans">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">People Search</h1>
            <p class="text-gray-600">Find professionals with advanced search filters and parameters</p>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8">
            <form id="searchForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search Query</label>
                    <div class="relative">
                        <input type="text" placeholder="Search for people, companies, positions..." 
                               class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue focus:border-linkedin-blue outline-none">
                        <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400"></i>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Company</label>
                        <div class="relative">
                            <input type="text" placeholder="e.g., Google, Microsoft" 
                                   class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue focus:border-linkedin-blue outline-none">
                            <i data-lucide="building-2" class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Position</label>
                        <div class="relative">
                            <input type="text" placeholder="e.g., Software Engineer" 
                                   class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue focus:border-linkedin-blue outline-none">
                            <i data-lucide="briefcase" class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                        <div class="relative">
                            <input type="text" placeholder="e.g., San Francisco, CA" 
                                   class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue focus:border-linkedin-blue outline-none">
                            <i data-lucide="map-pin" class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <button type="button" onclick="toggleAdvanced()" class="flex items-center text-linkedin-blue hover:text-linkedin-darkBlue font-medium">
                        <i data-lucide="filter" class="h-5 w-5 mr-2"></i>
                        <span id="filterToggleText">Show Advanced Filters</span>
                    </button>

                    <div class="flex space-x-3">
                        <button type="reset" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">Clear All</button>
                        <button type="submit" class="bg-linkedin-blue text-white px-6 py-2 rounded-lg font-medium hover:bg-linkedin-darkBlue transition-colors">
                            Search
                        </button>
                    </div>
                </div>

                <div id="advancedFilters" class="hidden border-t pt-6 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Skills (comma-separated)</label>
                            <input type="text" placeholder="e.g., React, Python, Machine Learning" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Education</label>
                            <div class="relative">
                                <input type="text" placeholder="e.g., Computer Science, MBA" 
                                       class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue outline-none">
                                <i data-lucide="graduation-cap" class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Industry</label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue outline-none">
                                <option value="">Select Industry</option>
                                <option value="technology">Technology</option>
                                <option value="finance">Finance</option>
                                <option value="healthcare">Healthcare</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Experience (years)</label>
                            <div class="flex space-x-2">
                                <input type="number" placeholder="Min" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue outline-none">
                                <input type="number" placeholder="Max" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue outline-none">
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-8">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Recent Searches</h3>
            <div class="flex flex-wrap gap-2">
                <button class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm hover:bg-gray-200 transition-colors">Software Engineer</button>
                <button class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm hover:bg-gray-200 transition-colors">React Developer</button>
                <button class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm hover:bg-gray-200 transition-colors">Google</button>
            </div>
        </div>

        <div class="mt-6 bg-white rounded-lg shadow-sm border border-gray-200 p-6 flex items-center justify-between border-l-4 border-linkedin-blue">
            <div>
                <h3 class="text-lg font-bold text-gray-900">Search Completed</h3>
                <p class="text-gray-600">Found 42 matching candidates based on your filters.</p>
            </div>
            <button class="bg-linkedin-blue text-white px-6 py-2 rounded-full font-medium hover:bg-linkedin-darkBlue transition-colors">
                View All Results
            </button>
        </div>

        <div id="loadingState" class="hidden mt-8 bg-white rounded-lg shadow-sm border border-gray-200 p-12 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-linkedin-blue mx-auto"></div>
            <p class="mt-4 text-gray-600">Searching for people...</p>
        </div>
    </div>

    <script>
        // Toggle Advanced Filters
        function toggleAdvanced() {
            const adv = document.getElementById('advancedFilters');
            const txt = document.getElementById('filterToggleText');
            if (adv.classList.contains('hidden')) {
                adv.classList.remove('hidden');
                txt.innerText = 'Hide Advanced Filters';
            } else {
                adv.classList.add('hidden');
                txt.innerText = 'Show Advanced Filters';
            }
        }

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
